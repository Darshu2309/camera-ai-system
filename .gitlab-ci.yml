stages:

* lint
* test

image: python:3.10

before_script:

* pip install --upgrade pip
* pip install -r requirements.txt

lint:
stage: lint
script:
- pip install flake8
- flake8 .

test:
stage: test
script:
- python -m compileall .

workflow:
rules:
- if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
- if: '$CI_COMMIT_BRANCH'
